<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="BGDLibrary — лента с фильтрами." />
  <title>BGDLibrary — Лента</title>
  <link rel="stylesheet" href="./src/styles/main.css" />
  <link rel="stylesheet" href="./src/styles/app.css" />
</head>
<body class="app">
  <a class="skip" href="#content">Перейти к контенту</a>

  <!-- Rail: icon nav -->
  <nav class="rail" aria-label="Навигация">
    <a class="rail__logo" href="./index.html" title="BGDLibrary">
      <div class="brand__mark rail__mark" aria-hidden="true">BGD</div>
    </a>
    <div class="rail__nav">
      <a class="rail__btn" href="./index.html" title="Главная">⌂</a>
      <a class="rail__btn is-active" href="./app.html" title="Лента">≡</a>
      <a class="rail__btn" href="./about.html" title="О проекте">?</a>
    </div>
    <div class="rail__foot">
      <a class="rail__btn" href="https://github.com/Ik4rCat/-BGD_Library_site" title="GitHub" target="_blank" rel="noopener">↗</a>
      <button class="rail__btn theme-toggle" id="theme-btn" aria-label="Переключить тему">☾</button>
    </div>
  </nav>

  <!-- App body -->
  <div class="app-body">

    <!-- Sidebar: filters -->
    <aside class="sidebar" aria-label="Фильтры">
      <div class="sidebar__head">
        <div class="sidebar__title">BGDLibrary</div>
        <div class="sidebar__sub muted">feed · v0.1</div>
      </div>

      <div class="filters">
        <div class="filters__group">
          <div class="filters__label">Категории</div>
          <div class="chips" data-filter-group="category">
            <button class="chip is-active" type="button" data-value="tutorial">Туториалы</button>
            <button class="chip is-active" type="button" data-value="engine">Движки</button>
            <button class="chip is-active" type="button" data-value="jobs">Вакансии</button>
            <button class="chip is-active" type="button" data-value="tools">Инструменты</button>
          </div>
        </div>

        <div class="filters__group">
          <div class="filters__label">Теги</div>
          <div class="chips" data-filter-group="tag">
            <button class="chip" type="button" data-value="unreal">unreal</button>
            <button class="chip" type="button" data-value="unity">unity</button>
            <button class="chip" type="button" data-value="godot">godot</button>
            <button class="chip" type="button" data-value="render">render</button>
            <button class="chip" type="button" data-value="tools">tools</button>
            <button class="chip" type="button" data-value="junior">junior</button>
          </div>
        </div>

        <div class="filters__group">
          <div class="filters__label">Действия</div>
          <div class="filters__actions">
            <button class="btn btn--ghost" type="button" data-action="clear">reset</button>
            <button class="btn btn--ghost" type="button" data-action="only-jobs">jobs only</button>
            <button class="btn btn--primary" type="button" data-action="reload">reload</button>
          </div>
        </div>
      </div>

      <div class="sidebar__foot">
        <div class="sidebar__status">
          <span class="sidebar__status-dot" id="api-dot"></span>
          api: <span id="api-status">probing…</span>
        </div>
      </div>
    </aside>

    <!-- Main: feed -->
    <main id="content" class="mainpane">
      <div class="mainpane__head">
        <h1 class="mainpane__title">Лента</h1>
        <div class="mainpane__meta">
          <span class="muted" id="feed-subtitle">Загрузка…</span>
          <span class="mainpane__count muted"><span id="feed-count">0</span> items</span>
        </div>
      </div>
      <div class="mainpane__scroll">
        <ol class="feed" id="feed-list" aria-label="Лента материалов"></ol>
      </div>
    </main>

  </div>

  <script>
    const btn = document.getElementById('theme-btn');
    const html = document.documentElement;
    const stored = localStorage.getItem('bgd-theme');
    if (stored) { html.dataset.theme = stored; btn.textContent = stored === 'dark' ? '☀' : '☾'; }
    btn.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      localStorage.setItem('bgd-theme', next);
      btn.textContent = next === 'dark' ? '☀' : '☾';
    });
  </script>
  <script type="module" src="./src/scripts/app.js"></script>
</body>
</html>
